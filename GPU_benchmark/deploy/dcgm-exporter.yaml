# Standalone DCGM-exporter for the GPU sweep's hardware metrics.
#
# Exposes Prometheus metrics on :9400, including the DCGM_FI_PROF_* profiling
# fields (DRAM_ACTIVE, PIPE_TENSOR_ACTIVE, SM_ACTIVE) the sweep relies on. Those
# require the SYS_ADMIN capability, set below. Runs as a DaemonSet on GPU nodes.
#
# Scrape URL for the sweep:
#   http://dcgm-exporter.gpu-monitoring.svc.cluster.local:9400/metrics
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-monitoring
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: gpu-monitoring
  labels:
    app: dcgm-exporter
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  template:
    metadata:
      labels:
        app: dcgm-exporter
    spec:
      nodeSelector:
        role: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
          # Use the DCP metrics file — it includes the PROF_* profiling fields
          # (DRAM/tensor/SM active). The default counters file does not.
          command: ["dcgm-exporter"]
          # -c 100: read the GPU every 100ms (default 30s is far too coarse for
          # short sweep windows; even 1s misses sub-second prefills). Pairs with
          # the scraper's 0.1s poll in config.json.
          args: ["-f", "/etc/dcgm-exporter/dcp-metrics-included.csv", "-a", ":9400", "-c", "100"]
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]   # required for PROF_* profiling metrics
          ports:
            - name: metrics
              containerPort: 9400
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: gpu-monitoring
  labels:
    app: dcgm-exporter
spec:
  type: ClusterIP
  selector:
    app: dcgm-exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: 9400
      protocol: TCP
