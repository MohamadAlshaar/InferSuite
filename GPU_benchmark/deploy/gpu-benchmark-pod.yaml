# GPU sweep runner pod.
#
# Uses the dedicated minimal gpu-benchmark image (python + requests + the
# GPU_benchmark code). Talks directly to vLLM (HTTP) and scrapes Prometheus —
# no privileged/hostPID/GPU device needed. It co-locates on the GPU node (spare
# CPU there, lowest network latency → cleanest TTFT). It tolerates the GPU taint.
#
# Deploy:
#   source deploy/config.env
#   sed -e "s/YOUR_ACCOUNT_ID/$AWS_ACCOUNT_ID/" -e "s/YOUR_REGION/$AWS_REGION/" \
#       GPU_benchmark/deploy/gpu-benchmark-pod.yaml | kubectl apply -f -
#
# Run:
#   kubectl exec -it -n llm-service gpu-benchmark -- python3 run_sweeps.py
#
# Copy results out:
#   kubectl cp -n llm-service gpu-benchmark:/app/GPU_benchmark/results ./gpu_results
apiVersion: v1
kind: Pod
metadata:
  name: gpu-benchmark
  namespace: llm-service
  labels:
    app: gpu-benchmark
spec:
  restartPolicy: Never
  serviceAccountName: default
  # Co-locate on the GPU node (it has spare CPU; vLLM is GPU-bound).
  nodeSelector:
    node.kubernetes.io/instance-type: g6.12xlarge
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  containers:
    - name: runner
      image: YOUR_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/llm-service/gpu-benchmark:latest
      imagePullPolicy: Always
      workingDir: /app/GPU_benchmark
      command: ["sleep", "infinity"]
      env:
        # vLLM OpenAI-compatible endpoint (direct — no FastAPI orchestrator).
        - name: VLLM_BASE_URL
          value: "http://ms-decode-direct.llm-d.svc.cluster.local:8000"
        - name: VLLM_METRICS_URL
          value: "http://ms-decode-direct.llm-d.svc.cluster.local:8000/metrics"
        # DCGM-exporter Prometheus endpoint (standalone dcgm-exporter.yaml).
        - name: DCGM_METRICS_URL
          value: "http://dcgm-exporter.gpu-monitoring.svc.cluster.local:9400/metrics"
        - name: MODEL
          value: "qwen2.5-14b"
        - name: MODEL_HF_REPO
          value: "Qwen/Qwen2.5-14B-Instruct"
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
  volumes: []
