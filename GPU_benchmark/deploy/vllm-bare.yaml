# Minimal standalone vLLM for the GPU sweep (no llm-d gateway, no orchestrator).
#
# Uses the same engine image llm-d deployed (ghcr.io/llm-d/llm-d-cuda:v0.6.0) so
# the prefill/decode kernels match the prior run. Serves Qwen2.5-14B with TP=4
# across the 4 L4s on a g6.12xlarge. Weights download from HF to an emptyDir at
# startup (~28 GB, ~5-10 min) — no EBS/PVC needed.
#
# Service name/namespace match GPU_benchmark/config.json default
# (ms-decode-direct.llm-d:8000), so no config change is needed.
#
# Apply AFTER the GPU node group + NVIDIA device plugin are up:
#   kubectl apply -f GPU_benchmark/deploy/vllm-bare.yaml
#   kubectl rollout status -n llm-d deploy/ms-decode-direct --timeout=1200s
apiVersion: v1
kind: Namespace
metadata:
  name: llm-d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-decode-direct
  namespace: llm-d
  labels:
    app: ms-decode-direct
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-decode-direct
  template:
    metadata:
      labels:
        app: ms-decode-direct
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: g6.12xlarge
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        # hostPath is created root-owned; make it writable for the (non-root) vLLM user.
        - name: fix-cache-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /model-cache && chmod 0777 /model-cache"]
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
      containers:
        - name: vllm
          image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
          command: ["/bin/sh", "-c"]
          args:
            - >
              exec vllm serve Qwen/Qwen2.5-14B-Instruct
              --served-model-name qwen2.5-14b
              --tensor-parallel-size 4
              --max-model-len 32000
              --max-num-seqs 32
              --gpu-memory-utilization 0.90
              --no-enable-prefix-caching
              --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /model-cache
            - name: VLLM_LOGGING_LEVEL
              value: INFO
          resources:
            limits:
              nvidia.com/gpu: 4
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: 4
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 80   # allow ~20 min for model download + load
      volumes:
        - name: model-cache
          hostPath:            # persist weights on the node across pod restarts
            path: /mnt/vllm-model-cache
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ms-decode-direct
  namespace: llm-d
spec:
  type: ClusterIP
  selector:
    app: ms-decode-direct
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
