# campaign.conf — single source of configuration for the GLM frontier-tier campaign.
# Rerun with a different model later: override MODEL_ID/GLM_ENDPOINT/KEYFILE (env wins over file).

MODEL_ID="${MODEL_ID:-glm-5.2}"
GLM_ENDPOINT="${GLM_ENDPOINT:-https://api.z.ai/api/paas/v4}"
KEYFILE="${KEYFILE:-$HOME/.glm_key}"
THINKING="${THINKING:-enabled}"            # recorded in metadata; default = model default (on)

PROXY_PORT="${PROXY_PORT:-8100}"           # litellm proxy (host); OC container reaches it via host.docker.internal

TIER_PREFIX="${TIER_PREFIX:-glm}"          # data lands in local_agents/data/<prefix>_*
REPEATS="${REPEATS:-3}"                    # episodes per config (adaptive +2 by hand if dispersion high)
WINSEC="${WINSEC:-10}"                     # seconds per counter window

# CPU partition (Xeon w5-3425: 12P cores, SMT pairs N/N+12)
CPUS_MEASURED="${CPUS_MEASURED:-2-11,14-23}"   # 10 phys + siblings = 20 logical (>=19 for OpenBLAS peak)
CPUS_HOUSE="${CPUS_HOUSE:-0-1,12-13}"          # OS, ssh, dockerd, proxy, perf writers, pollers, IRQs
HOUSE_IRQ_MASK="${HOUSE_IRQ_MASK:-3003}"       # hex bitmask of CPUS_HOUSE (cpus 0,1,12,13)

SWE_INSTANCES="${SWE_INSTANCES:-astropy__astropy-14096 scikit-learn__scikit-learn-25232 sympy__sympy-14248 django__django-10097}"
OC_TASKS="${OC_TASKS:-calendar web-digest pdf-digest image-crop}"

SWE_SUBSET="${SWE_SUBSET:-verified}"       # swe-bench subset (sweagent: lite/verified/full/
                                           # multimodal/multilingual); SWE_long JS/C++ tasks
                                           # use multilingual.
SWE_TEMP="${SWE_TEMP:-0.0}"                # sweagent sampling temp; 0.0 = stock/certified.
                                           # 0.0 loops deterministically on long tasks
                                           # (2026-07-11: 554x-identical-grep episode) — use
                                           # 0.6 for long runs (SWE_long), per prior Qwen fix.

SWE_DRAIN_S="${SWE_DRAIN_S:-2400}"         # max episode wall before kill
OC_DRAIN_S="${OC_DRAIN_S:-1200}"
