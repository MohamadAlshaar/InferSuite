# service_campaign.conf — isolated RAG-path service campaign (matches the GLM agent method).
# Grid: input length (bucket) x output tier (forced tokens) x repeats.
BUCKETS="${BUCKETS:-short medium long very_long}"
TIERS="${TIERS:-64 192 320}"
REPEATS="${REPEATS:-3}"            # repetition proof: identical deterministic load per repeat —
                                   # cross-repeat dispersion certifies measurement AND stationarity
WINSEC="${WINSEC:-10}"
CYCLES="${CYCLES:-3}"              # full passes over the 9 groups per cell (27 windows/cell)
WARMUP_S="${WARMUP_S:-45}"

CPUS_MEASURED="${CPUS_MEASURED:-2-11,14-23}"
CPUS_HOUSE="${CPUS_HOUSE:-0-1,12-13}"
HOUSE_IRQ_MASK="${HOUSE_IRQ_MASK:-3003}"

TIER_PREFIX="${TIER_PREFIX:-svc}"  # data -> local_service/data_iso/svc_<bucket>_tok<T>/run_<N>
