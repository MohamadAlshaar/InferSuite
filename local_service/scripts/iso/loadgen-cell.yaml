apiVersion: apps/v1
kind: Deployment
metadata: { name: loadgen, namespace: llm-service }
spec:
  replicas: 1
  selector: { matchLabels: { app: loadgen } }
  template:
    metadata: { labels: { app: loadgen } }
    spec:
      containers:
      - name: loadgen
        image: llm-service-kernel:fastapi-selfcontained
        imagePullPolicy: Never
        command: ["/bin/sh","-c"]
        args:
        - |
          while true; do
            python3 /app/scripts/query_runner.py --mode rag \
              --queries /app/benchmark_queries/rag/__BUCKET__.txt --size-bucket __BUCKET__ \
              --count 2000 --warmup 0 --max-tokens __MAX_TOKENS__ --concurrency 1 \
              --out-dir /tmp/lg 2>&1 | tail -1
          done
        env:
        - { name: BENCHMARK_URL, value: "http://llm-service-kernel.llm-service.svc.cluster.local:8080" }
        - { name: BENCHMARK_MODEL, value: "qwen2.5-7b-instruct-awq" }
        resources: { requests: { cpu: "1", memory: "1Gi" }, limits: { cpu: "4", memory: "3Gi" } }
