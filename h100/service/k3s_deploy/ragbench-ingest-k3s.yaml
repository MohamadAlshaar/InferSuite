apiVersion: batch/v1
kind: Job
metadata:
  name: ragbench-ingest
  namespace: llm-service
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels: { app: ragbench-ingest }
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: llm-service-kernel:fastapi-selfcontained
          imagePullPolicy: Never
          command:
            - python3
            - /app/scripts/ingest_ragbench_to_milvus.py
            - --n-filler
            - "0"
            - --tenant
            - tenantA
            - --bge-model-path
            - /app/fastapi_runtime_assets/models/bge-base-en-v1.5
            - --milvus-uri
            - http://milvus.llm-service.svc.cluster.local:19530
            - --milvus-token
            - root:Milvus
            - --collection
            - rag_chunks_seaweed_v2
            - --s3-endpoint-url
            - http://seaweed-s3.llm-service.svc.cluster.local:8333
            - --s3-access-key-id
            - llmbenchadmin
            - --s3-secret-access-key
            - llmbenchsecretkey123
            - --s3-bucket
            - llm-rag-store
            - --drop-existing
            - --download-workers
            - "8"
            - --queries-dir
            - /app/benchmark_queries
          resources:
            requests: { cpu: "4", memory: "8Gi" }
            limits: { cpu: "12", memory: "16Gi" }
