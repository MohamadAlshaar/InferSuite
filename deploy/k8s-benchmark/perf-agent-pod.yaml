apiVersion: v1
kind: Pod
metadata:
  name: perf-agent
  namespace: llm-service
  labels:
    app: perf-agent
spec:
  hostPID: true
  restartPolicy: Never
  serviceAccountName: default
  nodeSelector:
    node.kubernetes.io/instance-type: g6.12xlarge
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  containers:
    - name: agent
      image: YOUR_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/llm-service/fastapi:latest
      imagePullPolicy: Always
      command: ["/bin/bash"]
      args: ["-c", "sleep infinity"]
      securityContext:
        privileged: true
        runAsUser: 0
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
  volumes: []
