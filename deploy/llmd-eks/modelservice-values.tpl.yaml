multinode: false

modelArtifacts:
  uri: "pvc://llmd-model-pvc"
  name: "${MODEL_NAME}"

routing:
  servicePort: 8000
  proxy:
    image: "ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1"
    imagePullPolicy: IfNotPresent
    targetPort: 8200
    debugLevel: 5
    secure: false
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: infra-inference-gateway-istio
        namespace: ${NAMESPACE_LLMD}

decode:
  create: true
  replicas: ${MODEL_REPLICAS}
  parallelism:
    tensor: ${GPU_COUNT}
    data: 1
    dataLocal: 1
    workers: 1
  containers:
    - name: "vllm"
      image: "ghcr.io/llm-d/llm-d-cuda:v0.6.0"
      imagePullPolicy: IfNotPresent
      modelCommand: custom
      command:
        - "/bin/sh"
        - "-c"
      args:
        - |
          set -euo pipefail

          append_path_if_exists() {
            var_name="$1"
            path_value="$2"
            [ -n "${path_value}" ] || return 0
            [ -d "${path_value}" ] || return 0
            current="$(eval "printf '%s' \"\${$var_name:-}\"")"
            if [ -z "${current}" ]; then
              export "${var_name}=${path_value}"
            else
              case ":${current}:" in
                *":${path_value}:"*) ;;
                *) export "${var_name}=${current}:${path_value}" ;;
              esac
            fi
          }

          append_path_if_exists LD_LIBRARY_PATH /usr/lib/x86_64-linux-gnu
          append_path_if_exists LD_LIBRARY_PATH /usr/local/cuda/lib64
          append_path_if_exists LD_LIBRARY_PATH /usr/local/cuda/compat
          append_path_if_exists LD_LIBRARY_PATH /usr/local/cuda-12.9/compat
          append_path_if_exists LD_LIBRARY_PATH /usr/local/nvidia/lib
          append_path_if_exists LD_LIBRARY_PATH /usr/local/nvidia/lib64

          echo "[decode-startup] LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}" >&2

          # On Bottlerocket (EKS Auto Nvidia), NVIDIA userspace libs are in /usr/lib64
          # (not /usr/local/nvidia/lib64 as on standard nvidia-docker setups)
          export LD_LIBRARY_PATH=/usr/lib64:${LD_LIBRARY_PATH:-}

          exec vllm serve /model-cache \
            --host 0.0.0.0 \
            --port 8200 \
            --served-model-name ${MODEL_NAME} \
            --max-model-len ${MODEL_MAX_LEN} \
            --gpu-memory-utilization ${MODEL_GPU_MEM_UTIL} \
            --tensor-parallel-size ${GPU_COUNT} \
            --quantization awq_marlin \
            --enforce-eager
      env:
        - name: VLLM_LOGGING_LEVEL
          value: "INFO"
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
      ports:
        - containerPort: 8200
          name: metrics
          protocol: TCP
      resources:
        limits:
          nvidia.com/gpu: "${GPU_COUNT}"
          cpu: "16"
          memory: 60Gi
        requests:
          nvidia.com/gpu: "${GPU_COUNT}"
          cpu: "8"
          memory: 40Gi
      mountModelVolume: true
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: torch-compile-cache
          mountPath: /.cache
  nodeSelector:
    node.kubernetes.io/instance-type: ${GPU_INSTANCE_TYPE}
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}

prefill:
  create: false

accelerator:
  type: "nvidia"
