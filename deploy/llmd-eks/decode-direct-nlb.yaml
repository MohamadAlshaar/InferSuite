# Internal NLB so an in-VPC instance OUTSIDE the cluster (the dedicated c7i.metal agent box)
# can reach vLLM. The existing ms-decode-direct is ClusterIP (pod-network only) -> a bare-metal
# EC2 instance can't hit it. Apply this alongside it. (B3 fix from the pre-EKS validation.)
#   Reach it from the metal box at:  http://<nlb-dns>:8000/v1
#   Get the DNS:  kubectl -n llm-d get svc ms-decode-direct-nlb -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
# NOTE: instance-target NLB works with the in-tree cloud provider (no AWS LB Controller needed).
#       If the AWS Load Balancer Controller IS installed, the same annotations yield an IP NLB.
apiVersion: v1
kind: Service
metadata:
  name: ms-decode-direct-nlb
  namespace: llm-d
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
spec:
  type: LoadBalancer
  selector:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/role: decode
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
