# Static PVs binding pre-existing EBS volumes to storage PVCs.
# Volume IDs were tagged restore-*-2b-v2 from the prior cluster run (2026-06-08).
# All volumes are in eu-west-2b; claimRef pre-binds each PV to its PVC.
# Driver: ebs.csi.aws.com — EKS Auto Mode driver cannot attach pre-existing volumes.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: restore-milvus-data
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ebs-gp3
  csi:
    driver: ebs.csi.aws.com
    volumeHandle: vol-0484eb5b9556e7e40
    fsType: ext4
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - eu-west-2b
  claimRef:
    name: milvus-data-pvc
    namespace: llm-service
---
